<!doctype html>
<!--
  The Study — Stockfish edition (Kazper Kreative "Lab" build).
  Re-skinned to the shared ghostly Lab theme (/lab-assets/_shared/lab-theme.css) with
  procedural audio (/lab-assets/_shared/lab-audio.js). Real Stockfish 18 (lite single-
  threaded WASM) drives BOTH the opponent (strength-capped via UCI "Skill Level")
  and the coach (full-strength eval bar / move grading / hints). Rules/board:
  chess.js (vendored). Engine talks UCI over a Web Worker. Framed by the
  auth-gated /lab/chess route.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>The Study — Stockfish</title>
<link rel="stylesheet" href="/lab-assets/_shared/lab-theme.css">
<script src="/lab-assets/chess/chess.min.js"></script>
<script src="/lab-assets/_shared/lab-audio.js"></script>
<style>
  /* chess-specific: spectral glyph pieces */
  .sq .pc{font-size:min(8.4vw,58px);line-height:1;z-index:2;pointer-events:none;transition:filter .2s}
  @media(min-width:760px){.sq .pc{font-size:52px}}
  .sq .pc.w{color:#eafcff;text-shadow:0 0 10px rgba(120,240,255,.75),0 0 22px rgba(80,200,255,.45),0 2px 3px rgba(0,0,0,.55)}
  .sq .pc.b{color:#241433;text-shadow:0 0 12px rgba(185,49,255,.85),0 0 24px rgba(255,46,132,.5),0 1px 0 rgba(255,255,255,.12)}
  .sq.sel .pc{filter:drop-shadow(0 0 9px rgba(255,122,69,.85))}
  /* drag-and-drop + move animation: pieces that live outside .sq need their own color rules */
  .board{touch-action:none}
  .board.dragging,.board.dragging .sq{cursor:grabbing}
  .sq.drag-over::after{content:"";position:absolute;inset:0;z-index:1;border-radius:5px;
    box-shadow:inset 0 0 0 3px var(--hint),0 0 16px rgba(51,229,214,.45)}
  .drag-ghost,.moving-pc{position:fixed;transform:translate(-50%,-50%);pointer-events:none;line-height:1;will-change:left,top}
  .drag-ghost{z-index:60;filter:drop-shadow(0 0 12px rgba(255,122,69,.7))}
  .moving-pc{z-index:55;transition:left .18s cubic-bezier(.22,.61,.36,1),top .18s cubic-bezier(.22,.61,.36,1)}
  .drag-ghost.w,.moving-pc.w{color:#eafcff;text-shadow:0 0 10px rgba(120,240,255,.75),0 0 22px rgba(80,200,255,.45),0 2px 3px rgba(0,0,0,.55)}
  .drag-ghost.b,.moving-pc.b{color:#241433;text-shadow:0 0 12px rgba(185,49,255,.85),0 0 24px rgba(255,46,132,.5),0 1px 0 rgba(255,255,255,.12)}
  /* eval bar flips with the board so the side at the bottom of the board is at the bottom of the bar */
  .evalbar.flip .white{bottom:auto;top:0}
  /* board-box hosts the game-over overlay */
  .board-box{position:relative}
  .go-sub{font-size:14px;color:var(--ink-dim);margin:2px 0 0}
  .overlay-card .tag{display:inline-block;font-family:'Space Grotesk',system-ui,sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.06em;text-transform:uppercase;padding:3px 12px;border-radius:999px;
    border:1px solid currentColor;box-shadow:0 0 14px -2px currentColor}
  .overlay-card .tag.win{color:var(--good)} .overlay-card .tag.lose{color:var(--bad)} .overlay-card .tag.draw{color:var(--warn)}
  .overlay-card .btns{display:flex;gap:9px;margin-top:16px}
  @media(prefers-reduced-motion:reduce){.moving-pc{transition:none}}
  /* best-move arrow: shaft pulses, head matches */
  .hint-head{animation:hintpulse 1.8s ease-in-out infinite}
  /* move-list replay: clickable plies + transport bar */
  .moves-head{display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .navbtn{background:rgba(8,8,18,.6);border:1px solid var(--panel-edge);color:var(--ink-dim);
    border-radius:8px;min-width:34px;height:32px;cursor:pointer;font-size:14px;line-height:1;transition:.15s;
    display:grid;place-items:center}
  .navbtn:hover{color:var(--ink);border-color:var(--accent)}
  .navbtn:disabled{opacity:.35;cursor:default;border-color:var(--panel-edge);color:var(--ink-faint)}
  /* review strip pinned under the board so transport is in view on mobile */
  .review-strip{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;border-radius:12px;
    background:linear-gradient(180deg,rgba(20,20,34,.7),rgba(10,10,18,.66));border:1px solid var(--panel-edge);
    transition:border-color .2s,box-shadow .2s}
  .review-strip[hidden]{display:none}
  .review-strip.reviewing{border-color:var(--accent);box-shadow:0 0 22px rgba(255,122,69,.2)}
  .review-strip .navbtn{flex:0 0 auto;min-width:42px;height:34px;font-size:16px}
  .review-strip .rs-label{flex:1;text-align:center;font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:13px;color:var(--ink-faint);letter-spacing:.04em}
  .review-strip.reviewing .rs-label{color:var(--accent)}
  .coach .tag.rev{color:var(--violet)}
  .moves-head .rev-label{flex:1;text-align:center;font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:12px;color:var(--ink-faint);letter-spacing:.04em}
  .moves-head.reviewing .rev-label{color:var(--accent)}
  .moves .san{display:inline-block;padding:1px 6px;border-radius:5px;cursor:pointer;transition:background .12s,color .12s}
  .moves .san:hover{background:rgba(255,255,255,.07);color:var(--ink)}
  .moves .san.active{background:rgba(255,122,69,.22);color:var(--accent)}
  /* mobile: tighter spacing + bigger touch targets */
  @media(max-width:760px){
    body{padding:16px 12px 40px}
    header{margin-bottom:12px}
    .layout{gap:16px}
    .board-area{gap:8px}
    .evalbar{width:14px;border-radius:7px}
    .panel{padding:13px 13px 15px}
    .seg button{padding:11px 6px;font-size:13px}
    .btns .btn{min-width:0;padding:13px 10px}
    .moves{max-height:34vh}
    .sq .pc{font-size:min(11vw,60px)}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>The Study</h1>
    <span class="sub">Chess · Stockfish 18</span>
  </header>
  <div class="layout">
    <div>
      <div class="board-area">
        <div class="evalbar" title="Stockfish evaluation"><div class="white" id="evalWhite"></div><div class="mid"></div></div>
        <div class="board-box">
          <div class="board" id="board"></div>
          <div class="overlay" id="gameOver"><div class="overlay-card">
            <span class="tag" id="goTag"></span>
            <h3 id="goTitle"></h3>
            <p class="go-sub" id="goSub"></p>
            <div class="btns">
              <button class="btn primary" id="goNew">New game</button>
              <button class="btn" id="goReview">Review</button>
            </div>
          </div></div>
        </div>
      </div>
      <div class="thinking" id="thinking"></div>
      <div class="review-strip" id="reviewStrip" hidden>
        <button class="navbtn" id="rsStart" title="First move" aria-label="First move">⏮</button>
        <button class="navbtn" id="rsPrev" title="Back" aria-label="Back">‹</button>

    </div>
    <div>
      <div class="panel">
        <p class="status" id="status">Loading engine…</p>
        <div class="evalnum" id="evalNum">—</div>
        <div class="hr"></div>
        <div class="coach" id="coach"><div class="placeholder">Loading Stockfish. One moment…</div></div>
      </div>
      <div class="panel controls" id="spControls">
        <div class="row"><label class="lbl">Opponent strength</label></div>
        <div class="seg" id="levelSeg">
          <button data-lvl="0" class="on">Beginner</button>
          <button data-lvl="1">Casual</button>

        <div class="btns">
          <button class="btn" id="hintBtn">Show best move</button>

      </div>

          <button class="btn" id="mpResign">Resign</button>
          <button class="btn" id="mpRematch">Rematch</button>
        </div>
        <button class="btn" id="mpLeave">Leave match</button>
      </div>
      <div class="panel">
        <div class="moves-head" id="movesHead">
          <button class="navbtn" id="navStart" title="First move" aria-label="First move">⏮</button>
          <button class="navbtn" id="navPrev" title="Back" aria-label="Back">‹</button>
          <span class="rev-label" id="revLabel">Live</span>
          <button class="navbtn" id="navNext" title="Forward" aria-label="Forward">›</button>
          <button class="navbtn" id="navLive" title="Latest" aria-label="Latest">⏭</button>
        </div>
        <div class="moves" id="moves"><div class="empty">No moves yet.</div></div>
      </div>
    </div>
  </div>
  <footer>
    <span id="flag">Engine: starting…</span>
    <span class="audio-ctl" id="audioCtl"></span>
  </footer>
</div>

<div class="modal" id="promo"><div class="card"><h3>Promote to</h3><div class="opts" id="promoOpts"></div></div></div>

<script>
/* ===================== audio helper ===================== */
function sfx(name){ try{ window.LabAudio && window.LabAudio[name] && window.LabAudio[name](); }catch(e){} }
function moveSfx(move){
  const cap = move.flags && (move.flags.indexOf('c')>=0 || move.flags.indexOf('e')>=0);
  sfx(cap ? 'capture' : 'move');
  if(move.flags && move.flags.indexOf('p')>=0) sfx('promote');
}

/* ===================== game + state ===================== */
const game = new Chess();
const LEVELS = [
  {name:'Beginner', skill:0,  movetime:300},
  {name:'Casual',   skill:5,  movetime:450},
  {name:'Strong',   skill:11, movetime:700},
  {name:'Master',   skill:20, movetime:1000},
];
const ANALYSIS_MS = 600;
let level=0, humanColor='w', orientation='w';
let selected=null, legalDests=[], lastMove=null;
let busy=true;                 // gate input until engine ready / while engine works
let hintOn=false, hintMove=null;
let currentAnalysis=null;      // {best, scoreWhite, mateWhite, pv} for the position the human faces

/* multiplayer mode (read from the iframe URL set by the route) */
const MP_PARAMS = new URLSearchParams(location.search);
const MP = MP_PARAMS.get('mp')==='1';
const ROOM = MP_PARAMS.get('room') || '';
let mpColor='w', mpReady=false, mpRole=null, mpOver=false;

const GLYPH={p:'♟',n:'♞',b:'♝',r:'♜',q:'♛',k:'♚'};
const FILES=['a','b','c','d','e','f','g','h'];

/* ===================== Stockfish (UCI over Worker) ===================== */
let engine=null, engineReady=false, lineHandler=null;
let engineBusy=false; const taskQueue=[];

function engineSend(cmd){ engine.postMessage(cmd); }
function onEngineLine(raw){
  const line = (typeof raw==='string') ? raw : (raw && raw.data) ? raw.data : String(raw);
  if(!engineReady){
    if(line==='uciok'){
      engineSend('setoption name Threads value 1');
      engineSend('setoption name Hash value 32');
      engineReady=true; onEngineReady();
    }
    return;
  }
  if(lineHandler) lineHandler(line);
}
function runTask(taskFn){
  return new Promise(resolve=>{
    taskQueue.push(async()=>{ const r=await taskFn(); resolve(r); });
    pumpTasks();
  });
}
async function pumpTasks(){
  if(engineBusy||taskQueue.length===0) return;
  engineBusy=true;
  const t=taskQueue.shift();
  await t();
  engineBusy=false;
  pumpTasks();
}
// one UCI search; resolves {best, scoreWhite, mateWhite, pv}
function uciSearch(fen, skill, goCmd){
  return new Promise(resolve=>{
    let cp=null, mate=null, pv=null;
    const stm = fen.split(' ')[1];
    lineHandler = (line)=>{
      if(line.indexOf('info')===0 && line.indexOf(' pv ')>=0){
        const sm=line.match(/score (cp|mate) (-?\d+)/);
        if(sm){ if(sm[1]==='cp'){cp=+sm[2];mate=null;} else {mate=+sm[2];cp=null;} }
        const pm=line.match(/ pv (.+?)\s*$/); if(pm) pv=pm[1].split(/\s+/);
      } else if(line.indexOf('bestmove')===0){
        const best=line.split(/\s+/)[1];
        lineHandler=null;
        resolve({
          best,
          scoreWhite: cp!=null ? (stm==='w'?cp:-cp) : null,
          mateWhite:  mate!=null ? (stm==='w'?mate:-mate) : null,
          pv: (pv&&pv.length)?pv:[best]
        });
      }
    };
    engineSend('setoption name Skill Level value '+skill);
    engineSend('position fen '+fen);
    engineSend(goCmd);
  });
}
const analyze   = (fen)=>runTask(()=>uciSearch(fen,20,'go movetime '+ANALYSIS_MS));
const enginePlay= (fen,lvl)=>{ const L=LEVELS[lvl]; return runTask(()=>uciSearch(fen,L.skill,'go movetime '+L.movetime)); };

function initEngine(){
  try{
    engine=new Worker('/lab-assets/chess/stockfish-18-lite-single.js');
    engine.addEventListener('message', onEngineLine);
    engine.addEventListener('error', e=>{
      document.getElementById('coach').innerHTML =
        '<div class="placeholder">Could not start the engine. Make sure the page is served over http(s), not opened as a file.</div>';
      document.getElementById('flag').textContent='Engine: failed to load';
    });
    engineSend('uci');
  }catch(err){
    document.getElementById('flag').textContent='Engine: failed to load';
  }
}
function onEngineReady(){
  document.getElementById('flag').innerHTML='Engine: <span class="engine-flag">Stockfish 18 ready</span>';
  newGame();
}

/* ===================== rendering ===================== */
const boardEl=document.getElementById('board');
function sqName(f,r){ return FILES[f]+r; }
function disp(file,rank){ return orientation==='w' ? {row:8-rank,col:file} : {row:rank-1,col:7-file}; }
/* ----- move-list replay state ----- */
let reviewIndex=null;                 // null = live; else # of half-moves to display
function liveLen(){ return game.history().length; }
function isReviewing(){ return reviewIndex!=null && reviewIndex<liveLen(); }
function viewGame(){
  if(!isReviewing()) return game;
  const c=new Chess(); const h=game.history({verbose:true});
  for(let i=0;i<reviewIndex;i++){ const m=h[i]; c.move({from:m.from,to:m.to,promotion:m.promotion}); }
  return c;
}
function reviewLastMove(){
  if(!isReviewing()||reviewIndex<=0) return null;
  const m=game.history({verbose:true})[reviewIndex-1];
  return m?{from:m.from,to:m.to}:null;
}

function render(){
  boardEl.innerHTML='';
  const eb=document.querySelector('.evalbar'); if(eb) eb.classList.toggle('flip',orientation==='b');
  const view=viewGame(), reviewing=isReviewing();
  const checkSq=inCheckSquare(view);
  const lm = reviewing ? reviewLastMove() : lastMove;
  for(let row=0;row<8;row++)for(let col=0;col<8;col++){
    let file,rank;
    if(orientation==='w'){file=col;rank=8-row;} else {file=7-col;rank=row+1;}
    const name=sqName(file,rank), isLight=(file+rank)%2!==0;
    const cell=document.createElement('div');
    cell.className='sq '+(isLight?'l':'d'); cell.dataset.sq=name;
    const pc=view.get(name);
    if(pc){const s=document.createElement('span');s.className='pc '+pc.color;s.textContent=GLYPH[pc.type];cell.appendChild(s);}
    if(lm&&(name===lm.from||name===lm.to)) cell.classList.add('last');
    if(!reviewing&&selected===name) cell.classList.add('sel');
    if(checkSq===name) cell.classList.add('check');
    if(!reviewing&&legalDests.includes(name)){const d=document.createElement('div');d.className=pc?'ring':'dot';cell.appendChild(d);}
    if(col===0){const c=document.createElement('span');c.className='coord r '+(isLight?'on-l':'on-d');c.textContent=rank;cell.appendChild(c);}
    if(row===7){const c=document.createElement('span');c.className='coord f '+(isLight?'on-l':'on-d');c.textContent=FILES[file];cell.appendChild(c);}
    boardEl.appendChild(cell);
  }
  if(!reviewing&&hintOn&&hintMove&&game.turn()===humanColor&&!game.game_over()) drawArrow(hintMove.from,hintMove.to);
}
function inCheckSquare(g){
  g=g||game;
  if(!g.in_check()) return null;
  const t=g.turn(), b=g.board();
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){const pc=b[r][c];if(pc&&pc.type==='k'&&pc.color===t)return FILES[c]+(8-r);}
  return null;
}

/* ===================== interaction (pointer: drag + tap) ===================== */
const DRAG_THRESHOLD=6;
let down=null, dragging=false, ghostEl=null;

function inputAllowed(){ return !busy && !game.game_over() && game.turn()===humanColor && !isReviewing(); }

/* pixel geometry for the 8x8 grid, honouring board orientation */
function squareFromPoint(cx,cy){
  const r=boardEl.getBoundingClientRect();
  const x=cx-r.left, y=cy-r.top;
  if(x<0||y<0||x>r.width||y>r.height) return null;
  const col=Math.min(7,Math.floor(x/(r.width/8))), row=Math.min(7,Math.floor(y/(r.height/8)));
  let file,rank;
  if(orientation==='w'){ file=col; rank=8-row; } else { file=7-col; rank=row+1; }
  return FILES[file]+rank;
}
function squareCenter(name){
  const r=boardEl.getBoundingClientRect();
  const d=disp(FILES.indexOf(name[0]),parseInt(name[1]));
  const cw=r.width/8, ch=r.height/8;
  return { x:r.left+(d.col+0.5)*cw, y:r.top+(d.row+0.5)*ch };
}
function pieceAt(name){ return boardEl.querySelector('[data-sq="'+name+'"] .pc'); }

function selectSquare(name){
  selected=name; legalDests=game.moves({square:name,verbose:true}).map(m=>m.to); render(); sfx('select');
}
function tryMove(from,to,animate){
  const moving=game.get(from);
  if(moving&&moving.type==='p'&&(to[1]==='8'||to[1]==='1')) askPromotion(from,to,animate);
  else doHumanMove({from,to,animate:animate});
}
function handleTap(name){
  const pc=game.get(name);
  if(pc&&pc.color===humanColor){ if(name!==selected) selectSquare(name); return; }
  if(selected&&legalDests.includes(name)){ tryMove(selected,name,true); return; }
  selected=null; legalDests=[]; render();
}

/* floating piece that follows the pointer while dragging */
function startGhost(name,cx,cy){
  const o=pieceAt(name); if(!o) return;
  ghostEl=document.createElement('div');
  ghostEl.className='drag-ghost pc '+(game.get(name)||{}).color;
  ghostEl.textContent=o.textContent;
  ghostEl.style.fontSize=getComputedStyle(o).fontSize;
  document.body.appendChild(ghostEl); moveGhost(cx,cy);
  o.style.opacity='0';
}
function moveGhost(cx,cy){ if(ghostEl){ ghostEl.style.left=cx+'px'; ghostEl.style.top=cy+'px'; } }
function endGhost(){ if(ghostEl){ ghostEl.remove(); ghostEl=null; } }
function setDropTarget(name){
  boardEl.querySelectorAll('.sq.drag-over').forEach(s=>s.classList.remove('drag-over'));
  if(name&&legalDests.includes(name)){ const c=boardEl.querySelector('[data-sq="'+name+'"]'); if(c) c.classList.add('drag-over'); }
}

/* a piece sliding from→to (engine replies, tap moves, remote moves; not drags) */
function animateSlide(from,to){
  const dest=pieceAt(to); if(!dest) return;
  const a=squareCenter(from), b=squareCenter(to);
  const mover=document.createElement('div');
  mover.className='moving-pc pc '+(dest.classList.contains('b')?'b':'w');
  mover.textContent=dest.textContent;
  mover.style.fontSize=getComputedStyle(dest).fontSize;
  mover.style.left=a.x+'px'; mover.style.top=a.y+'px';
  document.body.appendChild(mover); dest.style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ mover.style.left=b.x+'px'; mover.style.top=b.y+'px'; }));
  setTimeout(()=>{ mover.remove(); if(dest) dest.style.opacity=''; },200);
}

function onPointerDown(e){
  if(e.button!=null&&e.button!==0) return;
  if(!inputAllowed()) return;
  const name=squareFromPoint(e.clientX,e.clientY); if(!name) return;
  down={sq:name,x:e.clientX,y:e.clientY};
  const pc=game.get(name);
  if(pc&&pc.color===humanColor){
    if(name!==selected) selectSquare(name);
    try{ boardEl.setPointerCapture(e.pointerId); }catch(_){}
  }
}
function onPointerMove(e){
  if(!down) return;
  if(!dragging){
    if(Math.hypot(e.clientX-down.x,e.clientY-down.y)<DRAG_THRESHOLD) return;
    const pc=game.get(down.sq);
    if(!(pc&&pc.color===humanColor)) return;   // only pieces drag
    dragging=true; boardEl.classList.add('dragging'); startGhost(down.sq,e.clientX,e.clientY);
  }
  moveGhost(e.clientX,e.clientY);
  setDropTarget(squareFromPoint(e.clientX,e.clientY));
  e.preventDefault();
}
function onPointerUp(e){
  if(!down) return;
  const drop=squareFromPoint(e.clientX,e.clientY);
  if(dragging){
    endGhost(); boardEl.classList.remove('dragging'); setDropTarget(null);
    const from=down.sq; dragging=false; down=null;
    if(drop&&drop!==from&&legalDests.includes(drop)) tryMove(from,drop,false); // dropped by hand → no slide
    else render();                                                             // illegal → snap back
    return;
  }
  const name=drop||down.sq; down=null;
  handleTap(name);
}
function onPointerCancel(){
  if(dragging){ endGhost(); boardEl.classList.remove('dragging'); setDropTarget(null); render(); }
  dragging=false; down=null;
}
function askPromotion(from,to,animate){
  const promo=document.getElementById('promo'), opts=document.getElementById('promoOpts');
  opts.innerHTML='';
  ['q','r','b','n'].forEach(t=>{
    const btn=document.createElement('button'); btn.textContent=GLYPH[t];
    btn.onclick=()=>{promo.classList.remove('show'); doHumanMove({from,to,promotion:t,animate:animate});};
    opts.appendChild(btn);
  });

async function doHumanMove(mv){
  if(busy) return;
  const before=currentAnalysis;                 // analysis of the position before this move
  const preFen=game.fen();
  const move=game.move({from:mv.from,to:mv.to,promotion:mv.promotion||'q'});
  if(!move){selected=null;legalDests=[];render();return;}
  lastMove={from:move.from,to:move.to};
  selected=null; legalDests=[]; clearArrow(); render(); updateStatus(); renderMoves();
  if(mv.animate) animateSlide(move.from,move.to);   // tap moves slide; drags already landed by hand
  moveSfx(move); if(game.in_check()&&!game.game_over()) sfx('check');

  if(MP){
    mpBroadcastMove(move);
    if(game.game_over()){ busy=true; updateStatus(); endSfx(); mpOver=true; mpFinishText(); showGameOver(); }
    else { busy=true; mpRefreshTurn(); }
    return;
  }

  busy=true;
  setThinking('Reviewing your move…');
  const after=await analyze(game.fen());
  coachGrade(move,before,after,preFen);
  refreshEvalBar(after);

  if(game.game_over()){ currentAnalysis=after; busy=false; setThinking(''); updateStatus(); endSfx(); showGameOver(); return; }

  setThinking('Stockfish is thinking…');
  const reply=await enginePlay(game.fen(),level);
  const m=game.move({from:reply.best.slice(0,2),to:reply.best.slice(2,4),promotion:reply.best[4]});
  if(m){ lastMove={from:m.from,to:m.to}; }
  reviewIndex=null;
  render(); updateStatus(); renderMoves();
  if(m){ animateSlide(m.from,m.to); moveSfx(m); if(game.in_check()&&!game.game_over()) sfx('check'); }
  if(game.game_over()){ endSfx(); showGameOver(); }

  busy=false;
  await settle();
}

function endSfx(){

/* ===================== coaching ===================== */
function cpOf(a){
  if(!a) return 0;
  if(a.mateWhite!=null) return a.mateWhite>0 ? 100000-a.mateWhite*100 : -100000-a.mateWhite*100;
  return a.scoreWhite!=null ? a.scoreWhite : 0;
}
function classify(loss,best){
  if(best) return {tag:'best',label:'Best move'};
  if(loss<25)  return {tag:'great',label:'Excellent'};
  if(loss<70)  return {tag:'good',label:'Good'};
  if(loss<150) return {tag:'inacc',label:'Inaccuracy'};
  if(loss<350) return {tag:'mistake',label:'Mistake'};
  return {tag:'blunder',label:'Blunder'};
}
function sanFromUci(fen,uci){
  try{const c=new Chess(fen);const m=c.move({from:uci.slice(0,2),to:uci.slice(2,4),promotion:uci[4]});return m?m.san:uci;}
  catch(e){return uci;}
}
function coachGrade(move,before,after,preFen){
  const bCp=cpOf(before), aCp=cpOf(after);
  let loss = humanColor==='w' ? (bCp-aCp) : (aCp-bCp);
  loss=Math.max(0,loss);
  const humanUci=move.from+move.to+(move.promotion||'');
  const playedBest = before&&before.best&&before.best.slice(0,4)===humanUci.slice(0,4);
  const c=classify(loss,playedBest);
  const coach=document.getElementById('coach');
  let msg='';
  if(playedBest){ msg='You played the move Stockfish likes best. '; }
  else{
    const bestSan = before&&before.best ? sanFromUci(preFen,before.best) : null;
    const lp=(loss/100).toFixed(1);
    if(c.tag==='great'||c.tag==='good') msg='Solid.'+(bestSan?` Stockfish leaned toward <b>${bestSan}</b>.`:'');
    else if(c.tag==='inacc')  msg=`Slightly loose — about <b>${lp}</b> of a pawn behind <b>${bestSan}</b>.`;
    else if(c.tag==='mistake')msg=`This concedes roughly <b>${lp}</b> pawns. <b>${bestSan}</b> was stronger.`;
    else msg=`Costly — around <b>${lp}</b> pawns. <b>${bestSan}</b> was much better here.`;
  }
  coach.innerHTML=`<span class="tag ${c.tag}">${c.label}</span><p class="msg">${msg}</p>`;
}

/* ===================== eval bar / status / hint ===================== */
function refreshEvalBar(a){
  const num=document.getElementById('evalNum'), bar=document.getElementById('evalWhite');
  if(!a){ num.textContent='—'; bar.style.height='50%'; return; }
  if(a.mateWhite!=null){
    num.textContent=(a.mateWhite>0?'White':'Black')+' mates in '+Math.abs(a.mateWhite);
    bar.style.height=(a.mateWhite>0?98:2)+'%'; return;
  }
  const cp=a.scoreWhite||0, cl=Math.max(-1000,Math.min(1000,cp));
  const share=50+50*(cl/1000)*(1.6-0.6*Math.abs(cl)/1000);
  bar.style.height=Math.max(2,Math.min(98,share))+'%';
  const p=cp/100;
  num.textContent=Math.abs(p)<0.2?'Even':((p>0?'White ':'Black ')+'+'+Math.abs(p).toFixed(1));
}

function renderMoves(){

    html+=`<div class="ply"><span class="no">${i/2+1}.</span>${san(i)}${san(i+1)}</div>`;

/* jump to the position after `idx` half-moves (idx>=liveLen → back to live) */

function updateReviewBar(){
  const rev=isReviewing(), len=liveLen(), cur = rev ? reviewIndex : len;
  const set=(id,txt)=>{const e=document.getElementById(id);if(e)e.textContent=txt;};
  const lbl = rev ? ('Move '+reviewIndex+' / '+len) : 'Live';

  dis('rsStart',cur<=0); dis('rsPrev',cur<=0); dis('rsNext',!rev); dis('rsLatest',!rev);
}
const SVGNS='http://www.w3.org/2000/svg';
function clearArrow(){const a=document.getElementById('arrows');if(a)a.remove();}
// Lichess-style best-move arrow: straight for most moves, L-bent for knights,
// with a tapered head whose tip lands on the destination centre. Coordinates are
// in the board's 8×8 viewBox (square centre = col+0.5, row+0.5), so it follows
// board flips automatically via disp().
function drawArrow(from,to){
  clearArrow();
  const f=disp(FILES.indexOf(from[0]),parseInt(from[1])), t=disp(FILES.indexOf(to[0]),parseInt(to[1]));
  const A={x:f.col+0.5,y:f.row+0.5}, B={x:t.col+0.5,y:t.row+0.5};
  const dc=t.col-f.col, dr=t.row-f.row;
  const knight=(Math.abs(dc)===1&&Math.abs(dr)===2)||(Math.abs(dc)===2&&Math.abs(dr)===1);
  let pts;
  if(knight){ const corner = Math.abs(dc)>Math.abs(dr) ? {x:B.x,y:A.y} : {x:A.x,y:B.y}; pts=[A,corner,B]; }
  else pts=[A,B];

  const W=0.17, HEAD=0.42, HALF=0.27, START_GAP=0.26;
  const norm=v=>{const l=Math.hypot(v.x,v.y)||1;return{x:v.x/l,y:v.y/l};};
  const lerp=(a,b,d)=>{const u=norm({x:b.x-a.x,y:b.y-a.y});return{x:a.x+u.x*d,y:a.y+u.y*d};};
  // pull the shaft start out of the origin square a touch
  const s0=lerp(pts[0],pts[1],START_GAP);
  // head sits on the final segment; shaft stops where the head begins
  const tip=pts[pts.length-1], prev=pts[pts.length-2];
  const dir=norm({x:tip.x-prev.x,y:tip.y-prev.y});
  const base={x:tip.x-dir.x*HEAD,y:tip.y-dir.y*HEAD};
  const perp={x:-dir.y,y:dir.x};
  const shaft=[s0,...pts.slice(1,-1),base];
  const shaftD='M '+shaft.map(p=>p.x.toFixed(3)+' '+p.y.toFixed(3)).join(' L ');
  const headD=`M ${tip.x.toFixed(3)} ${tip.y.toFixed(3)} `+
    `L ${(base.x+perp.x*HALF).toFixed(3)} ${(base.y+perp.y*HALF).toFixed(3)} `+
    `L ${(base.x-perp.x*HALF).toFixed(3)} ${(base.y-perp.y*HALF).toFixed(3)} Z`;
  const svg=document.createElementNS(SVGNS,'svg');
  svg.id='arrows'; svg.setAttribute('viewBox','0 0 8 8'); svg.setAttribute('preserveAspectRatio','none');
  svg.innerHTML=`<path class="hint-line" d="${shaftD}" fill="none" stroke="var(--hint)" stroke-width="${W}"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <path class="hint-head" d="${headD}" fill="var(--hint)" opacity="0.95"/>`;
  boardEl.appendChild(svg);
}
/* ----- strategy-oriented move explanations (engine PV + threat detection) ----- */
const PIECE_NAME={p:'pawn',n:'knight',b:'bishop',r:'rook',q:'queen',k:'king'};
const PIECE_VAL={p:1,n:3,b:3,r:5,q:9,k:0};
function cap1(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function evalLabel(a){
  if(!a) return '';
  if(a.mateWhite!=null) return (a.mateWhite>0?'White':'Black')+' mates in '+Math.abs(a.mateWhite);
  const p=(a.scoreWhite||0)/100;
  if(Math.abs(p)<0.2) return 'even';
  return (p>0?'White +':'Black +')+Math.abs(p).toFixed(1);
}
// the strategic point of a move (position passed is AFTER the move)
function coreIdea(after,m){
  if(m.flags.includes('k')) return 'castles the king to safety and brings the rook toward the centre';
  if(m.flags.includes('q')) return 'castles queenside, activating the rook and tucking the king away';
  if(m.flags.includes('p')) return 'promotes to a '+PIECE_NAME[m.promotion||'q']+' — a decisive material swing';
  if(after.in_checkmate()) return 'delivers checkmate';
  if(m.flags.includes('e')||m.flags.includes('c')){
    const ph='captures the '+(PIECE_NAME[m.captured]||'piece')+' on '+m.to;
    return after.in_check()? ph+', and it lands with check' : ph;
  }
  if(after.in_check()) return 'checks the king, seizing the initiative and forcing a response';
  if(m.piece==='p'&&['e4','d4','e5','d5'].includes(m.to)) return 'fights for the centre and frees the bishop and queen';
  if(m.piece==='p'&&['c4','c5','f4','f5','b4','g4'].includes(m.to)) return 'grabs space and pressures the centre from the wing';
  if((m.piece==='n'||m.piece==='b')&&(m.from[1]==='1'||m.from[1]==='8')) return 'develops the '+PIECE_NAME[m.piece]+' toward the centre, readying to castle';
  if(m.piece==='r'&&(m.to[0]==='d'||m.to[0]==='e')) return 'lifts the rook onto a central/open file where it bites hardest';
  if(m.piece==='q') return 'swings the queen to a more active, pressuring post';
  if(m.piece==='n') return 'reroutes the knight toward a stronger outpost';
  if(m.piece==='b') return 'puts the bishop on a longer, more dangerous diagonal';
  if(m.piece==='k') return 'walks the king to a safer square';
  if(m.piece==='p') return 'gains space with '+m.to+', cramping the opponent';
  return 'quietly improves the worst-placed piece';
}
// biggest winning capture the side that just moved now threatens (crude SEE: net material > 0)
function biggestThreat(fenAfter){
  try{
    const parts=fenAfter.split(' ');
    parts[1]=parts[1]==='w'?'b':'w'; parts[3]='-';   // hand the move back to the side that just played
    const fen=parts.join(' '), probe=new Chess(fen);
    if(probe.in_check()) return null;                 // can't probe a position that's actually check
    let best=null;
    probe.moves({verbose:true}).forEach(m=>{
      if(!(m.flags.includes('c')||m.flags.includes('e'))) return;
      const gain=PIECE_VAL[m.captured]||0;
      const t=new Chess(fen); t.move({from:m.from,to:m.to,promotion:'q'});
      const recapture=t.moves({verbose:true}).some(r=>r.to===m.to&&(r.flags.includes('c')||r.flags.includes('e')));
      const net = recapture ? gain-(PIECE_VAL[m.piece]||0) : gain;
      if(net>0 && (!best||net>best.net)) best={san:m.san,captured:m.captured,net};
    });
    return best;
  }catch(e){ return null; }
}
function uciToSanLine(fen,uciArr,max){
  const c=new Chess(fen), out=[];
  for(let i=0;i<Math.min(max,(uciArr||[]).length);i++){
    const u=uciArr[i], m=c.move({from:u.slice(0,2),to:u.slice(2,4),promotion:u[4]||'q'});
    if(!m) break; out.push(m.san);
  }
  return out;
}
// strategic description of a played move (used in review): core idea + any threat it sets up
function describeMove(after,m){
  const bits=[coreIdea(after,m)];
  if(!after.in_checkmate()){
    const th=biggestThreat(after.fen());
    if(th) bits.push('threatening <b>'+th.san+'</b> to win the '+(PIECE_NAME[th.captured]||'material'));
  }
  return cap1(bits.join(', '))+'.';
}
// rich live-hint explanation: core idea + threat + engine eval + the engine's planned line
function showHintExplanation(){
  if(!currentAnalysis||!currentAnalysis.best) return;
  const fen=game.fen(), a=currentAnalysis;
  const san=sanFromUci(fen,a.best), ev=evalLabel(a);
  let idea;
  try{
    const c=new Chess(fen);
    const m=c.move({from:a.best.slice(0,2),to:a.best.slice(2,4),promotion:a.best[4]||'q'});
    idea = (a.mateWhite!=null) ? cap1(coreIdea(c,m))+' — and it forces mate in '+Math.abs(a.mateWhite)+'.' : describeMove(c,m);
  }catch(e){ idea='The engine’s top choice here.'; }
  const line=uciToSanLine(fen,a.pv,5);
  const plan = line.length>=2 ? `<br><span style="color:var(--ink-faint)">Plan: <b>${line.join(' ')}</b></span>` : '';
  document.getElementById('coach').innerHTML=
    `<span class="tag great">Best move</span><p class="msg"><b>${san}</b>${ev?` <span style="color:var(--ink-faint)">(${ev})</span>`:''} — ${idea}${plan}</p>`;
}

function setHintArrow(){
  if(isReviewing()){ clearArrow(); return; }
  if(hintOn&&currentAnalysis&&currentAnalysis.best&&!game.game_over()&&game.turn()===humanColor){
    const b=currentAnalysis.best; hintMove={from:b.slice(0,2),to:b.slice(2,4)}; drawArrow(hintMove.from,hintMove.to);
    showHintExplanation();
  } else { hintMove=null; clearArrow(); }
}

  mpEl('status').textContent=(mpColor==='w'?'Black':'White')+' wins — you resigned';
  mpEl('mpStatus').textContent='You resigned.';
  showResult('lose','You resigned',(mpColor==='w'?'Black':'White')+' wins.');
}
function mpRematch(){ mpOver=false; newGameMP(); mpEl('coach').innerHTML='<div class="placeholder">Rematch — good luck.</div>'; }
function mpOnControl(p){
  if(!p||!p.t) return;
  if(p.t==='sync') mpApplySync(p.data&&p.data.moves);
  else if(p.t==='sync-request'){ if(mpColor==='w'&&!mpOver) mpSendSync(); }
  else if(p.t==='resign'){ mpOver=true; busy=true; sfx('win'); mpEl('status').textContent='Opponent resigned — you win'; mpEl('mpStatus').textContent='Opponent resigned — you win.'; showResult('win','Opponent resigned','You win.'); }
  else if(p.t==='rematch'){ mpRematch(); }
}
function newGameMP(){
  game.reset(); mpOver=false;
  selected=null; legalDests=[]; lastMove=null; hintMove=null; clearArrow(); reviewIndex=null;
  orientation=mpColor; render(); updateStatus(); renderMoves(); mpRefreshTurn();
}
function initMultiplayer(){
  loadScripts(['/lab-assets/_shared/supabase.js','/lab-assets/_shared/lab-multiplayer.js'], ()=>{
    const sp=mpEl('spControls'); if(sp) sp.style.display='none';
    const panel=mpEl('mpPanel'); if(panel) panel.hidden=false;
    const eb=document.querySelector('.evalbar'); if(eb) eb.style.display='none';
    mpEl('evalNum').style.display='none';
    mpEl('coach').innerHTML='<div class="placeholder">Live 1v1 — no engine analysis during a match.</div>';
    mpEl('flag').innerHTML='Mode: <span class="engine-flag">1v1 multiplayer</span>';
    const link=mpEl('mpLink'); if(link) link.value=LabMP.inviteUrl();
    mpEl('mpCopy').addEventListener('click',()=>{ try{ navigator.clipboard.writeText(LabMP.inviteUrl()); mpEl('mpCopy').textContent='Copied'; setTimeout(()=>{mpEl('mpCopy').textContent='Copy';},1200);}catch(e){} sfx('ui'); });
    mpEl('mpResign').addEventListener('click', mpResign);
    mpEl('mpRematch').addEventListener('click', ()=>{ sfx('ui'); LabMP.sendControl('rematch'); mpRematch(); });
    mpEl('mpLeave').addEventListener('click', ()=>{ sfx('ui'); try{ LabMP.leave(); }catch(e){} mpGoto(''); });
    busy=true;
    LabMP.join({ game:'chess', room:ROOM, on:{
      onStatus:(s)=>{ if(s==='error') mpEl('mpStatus').textContent='Connection problem — refresh to retry.'; },
      onAssign:(role,opp)=>{
        mpRole=role;
        if(role==='w'||role==='b'){ mpColor=role; humanColor=role; orientation=role; }
        mpReady=opp;
        mpEl('mpRoleLabel').textContent = role==='spectator' ? 'Spectating' : ('You are '+(role==='w'?'White':'Black'));
        mpSetDot(); render(); mpRefreshTurn();
      },
      onOpponent:(opp)=>{ mpReady=opp; mpSetDot(); if(opp&&mpColor==='w'&&game.history().length>0&&!mpOver) mpSendSync(); mpRefreshTurn(); },
      onMove:(p)=>{ applyRemoteMove(p.move); },
      onControl:(p)=>{ mpOnControl(p); },
    }});
    newGameMP();
  });
}

/* ===================== game-over overlay ===================== */
function showResult(cls,title,sub){
  const ov=document.getElementById('gameOver'); if(!ov) return;
  const tag=document.getElementById('goTag');
  tag.className='tag '+cls; tag.textContent=cls==='win'?'Victory':cls==='lose'?'Defeat':'Draw';
  document.getElementById('goTitle').textContent=title;
  document.getElementById('goSub').textContent=sub||'';
  document.getElementById('goReview').style.display = game.history().length ? '' : 'none';
  ov.classList.add('show');
}
function showGameOver(){
  if(!game.game_over()) return;
  let cls,t,s;
  if(game.in_checkmate()){
    const loser=game.turn(), won=loser!==humanColor;
    cls=won?'win':'lose'; t=won?'Checkmate — you win':'Checkmate'; s=(loser==='w'?'White':'Black')+' is mated.';
  } else if(game.in_stalemate()){ cls='draw'; t='Stalemate'; s='No legal moves — the game is drawn.'; }
  else if(game.in_threefold_repetition()){ cls='draw'; t='Draw'; s='Threefold repetition.'; }
  else if(game.insufficient_material()){ cls='draw'; t='Draw'; s='Insufficient material.'; }
  else { cls='draw'; t='Draw'; s='Fifty-move rule.'; }
  showResult(cls,t,s);
}
function hideGameOver(){ const ov=document.getElementById('gameOver'); if(ov) ov.classList.remove('show'); }

/* ===================== boot ===================== */
if(window.LabAudio) LabAudio.mountControls(document.getElementById('audioCtl'));
const mpStartBtn=document.getElementById('mpStartBtn');
if(mpStartBtn) mpStartBtn.addEventListener('click',()=>{ sfx('ui'); mpGoto(Math.random().toString(36).slice(2,8)); });

/* board input: unified pointer handlers (drag + tap) live on the board element */
boardEl.addEventListener('pointerdown',onPointerDown);
boardEl.addEventListener('pointermove',onPointerMove);
boardEl.addEventListener('pointerup',onPointerUp);
boardEl.addEventListener('pointercancel',onPointerCancel);

/* flip board (view only — does not change which side you play) */
document.getElementById('flipBtn').addEventListener('click',()=>{
  sfx('ui'); orientation=(orientation==='w'?'b':'w');
  selected=null; legalDests=[]; clearArrow(); render(); setHintArrow();
});
/* game-over overlay buttons */
document.getElementById('goNew').addEventListener('click',()=>{
  sfx('ui'); hideGameOver();
  if(MP){ try{ LabMP.sendControl('rematch'); }catch(_){}; mpRematch(); } else newGame();
});
document.getElementById('goReview').addEventListener('click',()=>{ sfx('ui'); hideGameOver(); });

/* move-list replay: click a ply, transport buttons, arrow keys */
function curPly(){ return isReviewing()?reviewIndex:liveLen(); }
document.getElementById('moves').addEventListener('click',e=>{
  const s=e.target.closest('.san[data-ply]'); if(!s) return; sfx('ui'); gotoPly(+s.dataset.ply);
});
document.getElementById('navStart').addEventListener('click',()=>{ if(liveLen()){ sfx('ui'); gotoPly(0);} });
document.getElementById('navPrev').addEventListener('click',()=>{ if(curPly()>0){ sfx('ui'); gotoPly(curPly()-1);} });
document.getElementById('navNext').addEventListener('click',()=>{ if(isReviewing()){ sfx('ui'); gotoPly(reviewIndex+1);} });
document.getElementById('navLive').addEventListener('click',()=>{ if(isReviewing()){ sfx('ui'); gotoPly(liveLen());} });
document.getElementById('rsStart').addEventListener('click',()=>{ if(curPly()>0){ sfx('ui'); gotoPly(0);} });
document.getElementById('rsPrev').addEventListener('click',()=>{ if(curPly()>0){ sfx('ui'); gotoPly(curPly()-1);} });
document.getElementById('rsNext').addEventListener('click',()=>{ if(isReviewing()){ sfx('ui'); gotoPly(reviewIndex+1);} });
document.getElementById('rsLatest').addEventListener('click',()=>{ if(isReviewing()){ sfx('ui'); gotoPly(liveLen());} });
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){ if(curPly()>0){ gotoPly(curPly()-1); e.preventDefault(); } }
  else if(e.key==='ArrowRight'){ if(isReviewing()){ gotoPly(reviewIndex+1); e.preventDefault(); } }
  else if(e.key==='Home'){ if(liveLen()){ gotoPly(0); e.preventDefault(); } }
  else if(e.key==='End'){ if(isReviewing()){ gotoPly(liveLen()); e.preventDefault(); } }
});
updateReviewBar();  // disable transport until there are moves

render();           // show the start position immediately
if(MP){ initMultiplayer(); } else { initEngine(); }
</script>
